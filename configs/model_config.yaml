model:
  name: "xgboost_baseline"
  type: "xgboost"
  version: "1.0.0"
  description: "XGBoost classifier for music genre classification on FMA Medium"

parameters:
  n_estimators: 100
  max_depth: 5
  learning_rate: 0.3
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 3
  reg_alpha: 0.1
  reg_lambda: 1
  random_state: 42
  n_jobs: -1

training:
  use_class_weights: true
  early_stopping: true
  early_stopping_patience: 20
  eval_metric: "mlogloss"

data:
  subset: "medium"
  min_samples_per_genre: 100
  use_features: true

paths:
  model_file: "models/xgboost_best.json"
  results_file: "results/xgboost_model_results.json"
  plots_dir: "results/plots"