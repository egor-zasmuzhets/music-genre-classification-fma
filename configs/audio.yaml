# configs/audio.yaml
# Параметры извлечения аудио-признаков

# Основные параметры
sample_rate: 22050
duration: 30                    # секунд, сколько брать из трека

# STFT параметры
n_fft: 2048
hop_length: 512
win_length: 2048

# Mel-спектрограмма
n_mels: 128
fmin: 0
fmax: 8000

# MFCC
n_mfcc: 20

# Chroma
n_chroma: 12

# Spectral contrast
n_bands: 7

# Аугментация (для обучения нейросетей)
augmentation:
  time_stretch: [0.9, 1.1]
  pitch_shift: [-2, 2]
  noise_std: 0.005
  spec_augment:
    time_masking: 5
    freq_masking: 5